<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FMPOS License Generator</title>

<style>
body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
    padding: 20px;
}
.section {
    border: 1px solid #ccc;
    padding: 15px;
    border-radius: 8px;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
}
.result {
    margin-top: 10px;
    background: #f2f2f2;
    padding: 10px;
}
</style>
</head>

<body>

<h1>FMPOS License Generator</h1>

<div class="section">

<label>Product ID：</label>
<input type="text" id="productId" placeholder="直接输入完整ID（不要加前缀）">

<label>Expiry Date：</label>
<input type="date" id="expiryDate">

<button onclick="gen()">生成授权码</button>

<div class="result" id="out"></div>

</div>

<script>

var SECRET_KEY = "TZTRAY-LICENSE-PRIVATE-2026";
var ALLOWED = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

function hash32(txt, seed){
    var h = seed, MOD = 2147483647;
    for(var i=0;i<txt.length;i++){
        h = h*33 + txt.charCodeAt(i);
        h = h - Math.floor(h/MOD)*MOD;
    }
    return h|0;
}

function longBytes(l){
    return [l&255,(l>>>8)&255,(l>>>16)&255,(l>>>24)&255];
}

function hashBytes(txt){
    var h1 = hash32(txt,5381);
    var h2 = hash32(txt,2166136261);
    var b1 = longBytes(h1), b2 = longBytes(h2);
    var o = [];
    for(var i=0;i<4;i++){
        o[i]=b1[i];
        o[i+4]=b2[i];
        o[i+8]=b1[i]^b2[i];
        o[i+12]=(b1[i]+b2[i])&255;
    }
    return o;
}

function encode(b){
    var s="";
    for(var i=0;i<b.length;i++){
        s+=ALLOWED[b[i]%ALLOWED.length];
    }
    return s;
}

function gen(){
    var pid = document.getElementById("productId").value.trim().toUpperCase();
    var d = document.getElementById("expiryDate").value;
    var out = document.getElementById("out");

    if(!pid || !d){
        out.innerText="请填写完整";
        return;
    }

    var p = d.split("-");
    var y = p[0], m = p[1], day = p[2];

    var payload = pid + "|" + y+m+day + "|" + SECRET_KEY;

    var h = encode(hashBytes(payload));

    var key = h.substr(0,4)+"-"+h.substr(4,4)+"-"+m+day+y+"-"+h.substr(0,2);

    out.innerText = key;
}

</script>

</body>
</html>
