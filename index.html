<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FMPOS License Generator</title>

<style>
body {
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}
.container {
    max-width:800px;
    margin:auto;
}
.box {
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    border:1px solid #ddd;
}
input {
    width:100%;
    padding:10px;
    margin-top:5px;
}
button {
    margin-top:10px;
    padding:10px;
}
.result {
    margin-top:10px;
    background:#eee;
    padding:10px;
}
.prefix {
    background:#eee;
    padding:10px;
}
.flex {
    display:flex;
}
.flex input {
    flex:1;
}
</style>
</head>

<body>

<div class="container">

<h1>FMPOS License Generator</h1>
<p>
ProductID 自动补全前缀 CHK-<br>
MachineID 已移除（新版无需）
</p>

<!-- 主授权 -->
<div class="box">

<h2>① 主授权码 / Main License Key</h2>

<label>Product ID（自动带 CHK-）：</label>
<div class="flex">
    <div class="prefix">CHK-</div>
    <input id="pid" placeholder="输入后半段，例如：00012345">
</div>

<label>Expiry Date（YYYY-MM-DD）：</label>
<input type="date" id="date">

<button onclick="gen()">生成主授权码 / Generate License</button>

<div class="result" id="out"></div>

</div>

<!-- B14 -->
<div class="box">

<h2>② B14 变更授权码 / B14 Change Code</h2>

<label>Product ID（自动带 CHK-）：</label>
<div class="flex">
    <div class="prefix">CHK-</div>
    <input id="pid2" placeholder="输入后半段">
</div>

<button onclick="genB14()">生成变更码 / Generate B14 Change Code</button>

<div class="result" id="out2"></div>

</div>

<div class="box">
<h3>注意</h3>
<p>本网页包含 SECRET_KEY，请勿公开给客户。</p>
</div>

</div>

<script>

var SECRET_KEY = "TZTRAY-LICENSE-PRIVATE-2026";
var CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

/* ===== Hash ===== */
function hash32(txt, seed){
    var h = seed, MOD = 2147483647;
    for(var i=0;i<txt.length;i++){
        var c = txt.charCodeAt(i);
        h = h*33 + c;
        h = h - Math.floor(h/MOD)*MOD;
    }
    return h|0;
}

function longBytes(l){
    return [l&255,(l>>>8)&255,(l>>>16)&255,(l>>>24)&255];
}

function hashBytes(txt){
    var h1 = hash32(txt,5381);
    var h2 = hash32(txt,2166136261);
    var b1 = longBytes(h1), b2 = longBytes(h2);
    var out = [];
    for(var i=0;i<4;i++){
        out[i]=b1[i];
        out[i+4]=b2[i];
        out[i+8]=b1[i]^b2[i];
        out[i+12]=(b1[i]+b2[i])&255;
    }
    return out;
}

function encode(b){
    var s="";
    for(var i=0;i<b.length;i++){
        s+=CHARS[b[i]%CHARS.length];
    }
    return s;
}

/* ===== 主授权 ===== */
function gen(){

    var pid = document.getElementById("pid").value.trim().toUpperCase();
    var d = document.getElementById("date").value;
    var out = document.getElementById("out");

    if(!pid || !d){
        out.innerText="请填写完整";
        return;
    }

    var productID = "CHK-" + pid;

    var p = d.split("-");
    var y=p[0], m=p[1], day=p[2];

    // ⭐ 完全匹配 VBA
    var payload = productID + "|" + y+m+day + "|" + SECRET_KEY;

    var h = encode(hashBytes(payload));

    var key =
        h.substr(0,4)+"-"+
        h.substr(4,4)+"-"+
        m+day+y+"-"+
        h.substr(0,2);

    out.innerText = key;
}

/* ===== B14 ===== */
function genB14(){

    var pid = document.getElementById("pid2").value.trim().toUpperCase();
    var out = document.getElementById("out2");

    if(!pid){
        out.innerText="请输入 ProductID";
        return;
    }

    var productID = "CHK-" + pid;

    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth()+1).padStart(2,'0');
    var d = String(now.getDate()).padStart(2,'0');

    var stamp = y+m+d;

    // ⭐ 完全匹配 VBA
    var payload = "CHG|" + productID + "|" + stamp + "|" + SECRET_KEY;

    var h = encode(hashBytes(payload));

    out.innerText = h.substr(0,8);
}

</script>

</body>
</html>
