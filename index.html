<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>License Generator</title>

<style>
body {
    font-family: Arial, "Microsoft YaHei";
    max-width: 650px;
    margin: 20px auto;
}

label {
    display: block;
    font-weight: bold;
    margin-top: 12px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    box-sizing: border-box;
}

button {
    margin-top: 14px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    background: #f2f2f2;
    padding: 10px;
    word-break: break-all;
}
</style>
</head>

<body>

<h2>FMPOS 主授权码 / Main License</h2>

<label>Product ID（产品编号）：</label>
<input type="text" id="productId" placeholder="只输入编号（系统自动加 ID-）">

<label>Expiry Date / 到期日期：</label>
<input type="date" id="expiryDate">

<button onclick="genLicense()">生成授权码 / Generate License</button>

<div class="result" id="out1"></div>

<h2>A7 变更码 / A7 Change Code</h2>

<label>Product ID（产品编号）：</label>
<input type="text" id="chgPidA7" placeholder="只输入编号（系统自动加 ID-）">

<button onclick="genA7()">生成变更码 / Generate A7 Code</button>

<div class="result" id="outA7"></div>
    
<h2>编号变更码 / B14 Change Code</h2>

<label>Product ID（产品编号）：</label>
<input type="text" id="chgPid" placeholder="只输入编号（系统自动加 ID-）">

<button onclick="genB14()">生成变更码 / Generate B14 Code</button>

<div class="result" id="out2"></div>


<script>
var SECRET_KEY = "TZTRAY-LICENSE-PRIVATE-2026";
var ALLOWED = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

/* ===== Hash ===== */
function hash32(txt, seed){
    var h = seed, MOD = 2147483647;
    for(var i=0;i<txt.length;i++){
        h = h*33 + txt.charCodeAt(i);
        h = h - Math.floor(h/MOD)*MOD;
    }
    return h|0;
}

function longToBytes(l){
    return [l&255,(l>>>8)&255,(l>>>16)&255,(l>>>24)&255];
}

function hashToBytes(txt){
    var h1=hash32(txt,5381), h2=hash32(txt,2166136261);
    var b1=longToBytes(h1), b2=longToBytes(h2);
    var o=[];
    for(var i=0;i<4;i++){
        o[i]=b1[i];
        o[i+4]=b2[i];
        o[i+8]=b1[i]^b2[i];
        o[i+12]=(b1[i]+b2[i])&255;
    }
    return o;
}

function encode(bytes){
    var s="";
    for(var i=0;i<bytes.length;i++){
        s+=ALLOWED.charAt(bytes[i]%ALLOWED.length);
    }
    return s;
}

/* ===== 主授权码 ===== */
function genLicense(){
    var raw = document.getElementById("productId").value.trim().toUpperCase();
    var date = document.getElementById("expiryDate").value;
    var out = document.getElementById("out1");

    if(!raw || !date){
        out.innerText="请输入 ProductID 和日期\nPlease enter ProductID and date";
        return;
    }

    var pid = "ID-" + raw;

    // yyyy-mm-dd → 拆分
    var parts = date.split("-");
    var yy = parts[0];
    var mm = parts[1];
    var dd = parts[2];

    var yyyymmdd = yy+mm+dd;
    var mmddyyyy = mm+dd+yy;

    var payload = pid + "|" + yyyymmdd + "|" + SECRET_KEY;
    var hash = encode(hashToBytes(payload));

    var key =
        hash.substring(0,4)+"-" +
        hash.substring(4,8)+"-" +
        mmddyyyy+"-" +
        hash.substring(0,2);

    out.innerText = key;
}

    function genA7(){
    var raw = document.getElementById("chgPidA7").value.trim().toUpperCase();
    var out = document.getElementById("outA7");

    if(!raw){
        out.innerText="请输入 ProductID\nPlease enter ProductID";
        return;
    }

    var pid = "ID-" + raw;

    var d = new Date();
    var y=d.getFullYear();
    var m=("0"+(d.getMonth()+1)).slice(-2);
    var da=("0"+d.getDate()).slice(-2);

    var stamp = ""+y+m+da;

    // ⭐ 关键区别：A7CHG
    var payload = "A7CHG|" + pid + "|" + stamp + "|" + SECRET_KEY;
    var hash = encode(hashToBytes(payload));

    out.innerText = hash.substring(0,8);
}
    
/* ===== B14 ===== */
function genB14(){
    var raw = document.getElementById("chgPid").value.trim().toUpperCase();
    var out = document.getElementById("out2");

    if(!raw){
        out.innerText="请输入 ProductID\nPlease enter ProductID";
        return;
    }

    var pid = "ID-" + raw;

    var d = new Date();
    var y=d.getFullYear();
    var m=("0"+(d.getMonth()+1)).slice(-2);
    var da=("0"+d.getDate()).slice(-2);

    var stamp = ""+y+m+da;

    var payload = "CHG|" + pid + "|" + stamp + "|" + SECRET_KEY;
    var hash = encode(hashToBytes(payload));

    out.innerText = hash.substring(0,8);
}
</script>

</body>
</html>
